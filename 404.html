<!DOCTYPE html>
<html>
<head>
    <title>404</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            animation: darkblood 60s forwards;
        }

        @keyframes darkblood {
            0%   { background-color: #000000; }
            100% { background-color: #8b0000; }
        }

        img {
            width: 60%;
            max-width: 300px;
            opacity: 0;
            animation: appear 60s forwards;
        }

        @keyframes appear {
            0%   { opacity: 0; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>
    <img src="images/god.png" alt="">
    <audio id="bg-audio" src="sounds/watson_intro.mp3" loop autoplay></audio>
    <script>
        const audio = document.getElementById('bg-audio');
        audio.volume = 0.4;
        audio.play();
        const duration = 9500;
        const start = Date.now();
        function fade() {
            const elapsed = Date.now() - start;
            const progress = Math.min(elapsed / duration, 1);
            audio.volume = 0.4 + 0.6 * progress;
            if(progress < 1) requestAnimationFrame(fade);
        }
        fade();
        setTimeout(() => location.href = "index.html", 10000);
    </script>
</body>
</html>
