<!DOCTYPE html>
<html>
<head>
    <title>index</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #c8f5a0;
            font-family: Arial, sans-serif;
        }

        .topbar {
            background-color: #8db87a;
            padding: 18px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 3px solid #6a9e58;
        }

        .topbar a img {
            height: 55px;
            width: auto;
        }

        .topbar input {
            padding: 10px 14px;
            font-family: Arial, sans-serif;
            font-size: 15px;
            border: 2px solid #6a9e58;
            background-color: #eef2e6;
            border-radius: 4px;
            width: 45%;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 12px;
            padding: 16px;
            height: auto;
        }

        .grid-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .grid-item a {
            display: block;
            width: 100%;
        }

        .grid-item img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            display: block;
            border-radius: 6px;
        }

        .grid-item span {
            font-size: 12px;
            color: #2a4a1a;
            font-weight: bold;
            text-align: center;
        }

        .chatbox {
            background-color: rgba(0, 0, 0, 0.15);
            margin: 20px;
            padding: 16px;
            border-radius: 6px;
            font-size: 14px;
            color: #1a1a1a;
            line-height: 2;
        }

        .chatbox a.nick {
            font-weight: bold;
            color: #3a6e2a;
            text-decoration: none;
        }

        .chatbox a.nick:hover {
            text-decoration: underline;
        }

        .chatbox a.inline {
            color: #3a6e2a;
            text-decoration: underline;
        }

        .closed {
            text-align: center;
            font-weight: bold;
            font-size: 15px;
            padding: 10px 20px 30px;
            animation: flashcolor 1.5s infinite;
        }

        @keyframes flashcolor {
            0%   { color: yellow; }
            50%  { color: red; }
            100% { color: yellow; }
        }
    </style>
</head>
<body>

    <div class="topbar">
        <a href="index.html"><img src="images/logo.png" alt="logo"></a>

    </div>

        </div>
        <div class="grid-item">

            <span>char1v1d1s</span>
        </div>
        <div class="grid-item">
            <a href="404.html"><img src="images/missing.png" alt="missing"></a>
            <span>41nzo0alg0wn</span>
        </div>
        <div class="grid-item">
            <a href="page/malevolentlover67.html"><img src="images/profile2.png" alt="profile2"></a>
            <span>malevolentlover67</span>
        </div>
    </div>

    <div class="chatbox">
        <a href="pages/lost.html" class="nick">Sweetvenom14</a>: yo dude, we're alone wth? Lolll<br>
        <a href="pages/lost.html" class="nick">Malevolentlover67</a>: yeah haha<br>
        <a href="pages/lost.html" class="nick">Malevolentlover67</a>: we need to meet up bud<br>
        <a href="pages/lost.html" class="nick">Sweetvenom14</a>: wut, wher3???? O.o<br>
        <a href="pages/lost.html" class="nick">Malevolentlover67</a>: <a href="page/location.html" class="inline">here</a><br>
    </div>

    <div class="closed">
        CHAT CLOSED DUE POLICE INVESTIGATION
    </div>

</body>
</html>
