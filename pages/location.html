<!DOCTYPE html>
<html>
<head>
    <title>not found</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
            overflow: hidden;
            animation: darkblood 60s forwards;
        }

        @keyframes darkblood {
            0%   { background-color: #000000; }
            100% { background-color: #8b0000; }
        }

        img {
            width: 60%;
            max-width: 300px;
            opacity: 0;
            animation: appear 60s forwards;
            position: absolute;
        }

        #matrix {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: none;
            z-index: 0;
        }

        #game {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 10;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
        }

        #game.active { display: flex; }

        #game-title {
            color: #00ff00;
            font-family: monospace;
            font-size: 0.9rem;
            letter-spacing: 4px;
            text-shadow: 0 0 10px #00ff00;
        }

        #progress-wrap {
            width: 360px;
            height: 6px;
            background: #001100;
            border: 1px solid #00ff00;
        }

        #progress-bar {
            height: 100%;
            width: 100%;
            background: #00ff00;
            box-shadow: 0 0 8px #00ff00;
            transition: width 0.1s linear;
        }

        #grid {
            display: grid;
            grid-template-columns: repeat(5, 70px);
            grid-template-rows: repeat(4, 70px);
            gap: 10px;
        }

        .node {
            width: 70px;
            height: 70px;
            border: 1px solid #003300;
            border-radius: 50%;
            background: #001100;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: monospace;
            font-size: 0.7rem;
            color: #005500;
            transition: all 0.1s;
        }

        .node.active {
            border-color: #00ff00;
            background: #002200;
            color: #00ff00;
            box-shadow: 0 0 15px #00ff00, inset 0 0 10px #003300;
            animation: pulse 0.5s infinite alternate;
        }

        @keyframes pulse {
            from { box-shadow: 0 0 10px #00ff00; }
            to   { box-shadow: 0 0 25px #00ff00, 0 0 5px #00ff00 inset; }
        }

        #status {
            color: #00ff00;
            font-family: monospace;
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-shadow: 0 0 8px #00ff00;
        }

        #lose-screen {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000000;
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        #lose-screen.active { display: flex; }

        #lose-text {
            color: #ffffff;
            font-family: monospace;
            font-size: 0.75rem;
            letter-spacing: 8px;
            animation: flicker 1.2s infinite;
        }

        @keyframes flicker {
            0%, 100% { opacity: 1; }
            30% { opacity: 0.1; }
            60% { opacity: 0.8; }
            80% { opacity: 0.05; }
        }

        #win-screen {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000000;
            z-index: 100;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
        }

        #win-screen.active { display: flex; }

        #password {
            color: #00ff00;
            font-family: monospace;
            font-size: 1.4rem;
            letter-spacing: 6px;
            text-shadow: 0 0 15px #00ff00;
            border: 1px solid #00ff00;
            padding: 10px 24px;
        }
    </style>
</head>
<body>

    <img src="../images/god.png" alt="">
    <canvas id="matrix"></canvas>

    <div id="game">
        <div id="game-title">// INTRUSION DETECTED — CLICK THE NODES //</div>
        <div id="progress-wrap">
            <div id="progress-bar"></div>
        </div>
        <div id="grid"></div>
        <div id="status">NODES NEUTRALIZED: <span id="score">0</span></div>
    </div>

    <div id="lose-screen">
        <div id="lose-text">i caught you</div>
    </div>

    <div id="win-screen">
        <div id="password">awesompassworxd</div>
    </div>

<script>
const canvas = document.getElementById('matrix');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

const chars = '01アイウエオ死null>_#@%&';
const fontSize = 13;
let drops = [];

function initDrops() {
    drops = Array(Math.floor(canvas.width / fontSize)).fill(1);
}
initDrops();

function drawMatrix() {
    ctx.fillStyle = 'rgba(0,0,0,0.06)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    for (let i = 0; i < drops.length; i++) {
        const text = chars[Math.floor(Math.random() * chars.length)];
        ctx.fillStyle = Math.random() > 0.96 ? '#fff' : '#00ff00';
        ctx.globalAlpha = Math.random() * 0.5 + 0.3;
        ctx.font = fontSize + 'px monospace';
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
    }
    ctx.globalAlpha = 1;
}

const ROWS = 4, COLS = 5;
const TOTAL_NODES = ROWS * COLS;

let NODE_LIFETIME = 2200;
let spawnRate = 1400;
const GAME_DURATION = 60000;

let score = 0;
let gameActive = false;
let matrixInterval, spawnTimeout, gameTimer, progressInterval;
let activeNodes = new Map();
let gameStart;

const grid = document.getElementById('grid');
const scoreEl = document.getElementById('score');
const progressBar = document.getElementById('progress-bar');
const nodes = [];

for (let i = 0; i < TOTAL_NODES; i++) {
    const node = document.createElement('div');
    node.className = 'node';
    node.innerHTML = `<span>${String(i).padStart(2,'0')}</span>`;
    node.addEventListener('click', () => clickNode(i));
    grid.appendChild(node);
    nodes.push(node);
}

function activateNode(index) {
    if (!gameActive || activeNodes.has(index)) return;

    const isTrap = Math.random() < 0.18;
    const isFast = Math.random() < 0.25;

    nodes[index].classList.add('active');

    if (isTrap) nodes[index].style.background = "#220000";
    if (isFast) nodes[index].style.borderColor = "#ff0000";

    const lifetime = isFast ? NODE_LIFETIME * 0.6 : NODE_LIFETIME;

    const timeout = setTimeout(() => lose("too slow"), lifetime);

    activeNodes.set(index, { timeout, isTrap });
}

function clickNode(index) {
    if (!gameActive || !activeNodes.has(index)) return;

    const data = activeNodes.get(index);

    nodes[index].style.transform = "scale(0.75)";
    setTimeout(() => nodes[index].style.transform = "scale(1)", 100);

    if (data.isTrap) {
        lose("wrong one");
        return;
    }

    clearTimeout(data.timeout);
    activeNodes.delete(index);

    nodes[index].classList.remove('active');
    nodes[index].style.background = "";
    nodes[index].style.borderColor = "";

    score++;
    scoreEl.textContent = score;

    if (score >= 45) win();
}

function spawnLoop() {
    if (!gameActive) return;

    spawnNode();

    spawnRate *= 0.985;
    NODE_LIFETIME *= 0.995;

    spawnTimeout = setTimeout(spawnLoop, spawnRate);
}

function spawnNode() {
    const available = [];
    for (let i = 0; i < TOTAL_NODES; i++) {
        if (!activeNodes.has(i)) available.push(i);
    }
    if (available.length === 0) return;

    activateNode(available[Math.floor(Math.random() * available.length)]);
}

function stopAll() {
    gameActive = false;
    clearInterval(matrixInterval);
    clearTimeout(spawnTimeout);
    clearInterval(progressInterval);
    clearTimeout(gameTimer);

    activeNodes.forEach(t => clearTimeout(t.timeout));
    activeNodes.clear();

    document.getElementById('game').classList.remove('active');
    canvas.style.display = 'none';
}

function lose(reason = "i caught you") {
    stopAll();

    document.getElementById('lose-text').textContent = reason;
    document.body.style.backgroundColor = "#300000";

    document.getElementById('lose-screen').classList.add('active');

    setTimeout(() => location.href = "./index.html", 4000);
}

function win() {
    stopAll();
    document.getElementById('win-screen').classList.add('active');
}

function startGame() {
    canvas.style.display = 'block';
    document.getElementById('game').classList.add('active');
    document.querySelector('img').style.display = 'none';

    gameActive = true;
    score = 0;
    scoreEl.textContent = 0;
    gameStart = Date.now();

    matrixInterval = setInterval(drawMatrix, 40);
    spawnLoop();

    gameTimer = setTimeout(win, GAME_DURATION);

    progressInterval = setInterval(() => {
        const elapsed = Date.now() - gameStart;
        const pct = Math.max(0, 100 - (elapsed / GAME_DURATION) * 100);
        progressBar.style.width = pct + '%';
    }, 100);
}

setTimeout(startGame, 2000);
</script>
</body>
</html>
